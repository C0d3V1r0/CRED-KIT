<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="00%" x2="100%" y%" y1="2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="512" y2="100" stroke="#ff2a2a" stroke-width="2"/>
    <line x1="0" y1="200" x2="512" y2="200" stroke="#ff2a2a" stroke-width="2"/>
    <line x1="0" y1="300" x2="512" y2="300" stroke="#ff2a2a" stroke-width="2"/>
    <line x1="0" y1="400" x2="512" y2="400" stroke="#ff2a2a" stroke-width="2"/>
    <line x1="100" y1="0" x2="100" y2="512" stroke="#ff2a2a" stroke-width="2"/>
    <line x1="200" y1="0" x2="200" y2="512" stroke="#ff2a2a" stroke-width="2"/>
    <line x1="300" y1="0" x2="300" y2="512" stroke="#ff2a2a" stroke-width="2"/>
    <line x1="400" y1="0" x2="400" y2="512" stroke="#ff2a2a" stroke-width="2"/>
  </g>
  <!-- C letter (Cyberpunk style) -->
  <text x="256" y="340" font-family="Orbitron, sans-serif" font-size="280" font-weight="bold" fill="none" stroke="#ff2a2a" stroke-width="8">C</text>
  <!-- R letter -->
  <text x="330" y="340" font-family="Orbitron, sans-serif" font-size="280" font-weight="bold" fill="none" stroke="#00f0ff" stroke-width="8">R</text>
  <!-- Glow effect -->
  <text x="256" y="340" font-family="Orbitron, sans-serif" font-size="280" font-weight="bold" fill="#ff2a2a" opacity="0.3" filter="blur(4px)">C</text>
  <text x="330" y="340" font-family="Orbitron, sans-serif" font-size="280" font-weight="bold" fill="#00f0ff" opacity="0.3" filter="blur(4px)">R</text>
</svg>
